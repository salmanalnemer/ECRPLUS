<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECR - تسجيل الدخول</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --denger: #d80404;
            --denger-dark: #880c0c;
            --accent: #ef4444;
            --bg: #ffffff;
            --input-bg: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .app-header {
            text-align: center;
            padding: 40px 0 20px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--denger), var(--denger-dark));
            color: white;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 auto 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 16px 48px 16px 16px;
            background-color: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            font-size: 1rem;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--denger);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .app-alert {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 20px;
        }

        body::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="app-header">
        <div class="logo-circle">ECR</div>
        <h1>مرحباً بك</h1>
        <p>نظام الاستجابة للحالات الطارئة</p>
    </div>

    <div class="login-form-area">
        {% if messages %}
            {% for message in messages %}
                <div class="app-alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>رقم الهوية</label>
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="identity"
                        name="identity"
                        required
                        maxlength="10"
                        minlength="10"
                        pattern="\d{10}"
                        inputmode="numeric"
                        placeholder="- - - - - - - - - -"
                        oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
                    >
                    <i class="fas fa-id-card"></i>
                </div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        name="password"
                        required
                        placeholder="••••••••"
                    >
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                دخول
            </button>
        </form>
    </div>

</div>

</body>
</html>
