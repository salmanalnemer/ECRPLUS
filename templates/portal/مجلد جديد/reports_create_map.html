{% extends "portal/base_portal.html" %}
{% load static %}
{% block content %}

<style>
  .page-wrapper {
    display: flex;
    gap: 15px;
    padding: 15px;
    background: #f1f5f9;
    height: calc(100vh - 100px);
  }

  /* عامود النموذج - واسع ومنظم */
  .form-column {
    flex: 1.1; 
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* عامود الخريطة - أوسع كما طلبت */
  .map-column {
    flex: 1; 
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .column-header {
    background: #1e293b;
    color: #fff;
    padding: 12px 18px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .scroll-content { padding: 20px; overflow-y: auto; flex: 1; }
  
  #map-canvas { width: 100%; flex: 1; }

  /* تنسيق الشبكة للحقول */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field-group { display: flex; flex-direction: column; gap: 5px; }
  .field-group label { font-size: 0.8rem; font-weight: 700; color: #475569; }
  
  input, select, textarea {
    padding: 10px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: 'Tajawal';
  }

  .input-readonly { background: #f8fafc; color: #e31e24; font-weight: bold; border-color: #fca5a5; }

  .btn-submit {
    background: #e31e24;
    color: white;
    padding: 14px;
    border-radius: 8px;
    font-weight: bold;
    width: 100%;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    transition: 0.3s;
  }

  .btn-submit:hover { background: #b91c1c; }

  .map-toolbar {
    padding: 8px;
    background: #fffbeb;
    color: #92400e;
    font-size: 0.75rem;
    text-align: center;
    border-bottom: 1px solid #fef3c7;
  }
</style>

<div class="page-wrapper">
  
  <div class="form-column">
    <div class="column-header">
      <span><i class="fas fa-file-medical"></i> إنشاء بلاغ مستجيب (CAD)</span>
    </div>
    
    <div class="scroll-content">
      <form id="createReportForm" onsubmit="submitCreateReport(event)">
        {% csrf_token %}
        
        <div class="grid-2">
          <div class="field-group">
            <label>رقم البلاغ CAD</label>
             <input name="cad_number"type="number"step="1"min="1"requiredplaceholder="مثال: 1325"oninput="this.value=this.value.replace(/[^0-9]/g,'')">

          </div>
          <div class="field-group">
            <label>وقت استقبال البلاغ</label>
            <input id="cad_received_time" name="cad_received_time" type="time" step="1" required>
          </div>
        </div>

        <div class="grid-2">
          <div class="field-group">
            <label>درجة الخطورة</label>
            <select name="severity" required>
              <option value="">— اختر —</option>
              <option value="critical">خطرة</option>
              <option value="medium">متوسطة</option>
              <option value="simple">بسيطة</option>
            </select>
          </div>
          <div class="field-group">
            <label>حالة الوعي</label>
            <select name="awareness" required>
              <option value="">— اختر —</option>
              <option value="aware">واعي</option>
              <option value="unaware">غير واعي</option>
            </select>
          </div>
        </div>

        <div class="grid-2">
          <div class="field-group">
            <label>نوع الحالة</label>
            <select name="case_type" required>
              <option value="">— اختر نوع الحالة —</option>
              {% for ct in case_types %}
                <option value="{{ ct.id }}">{{ ct }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="field-group">
            <label>عدد المصابين</label>
            <input name="injured_count" type="number" min="0" required value="1">
          </div>
        </div>

        <div class="grid-2">
          <div class="field-group">
            <label>العمر</label>
            <input name="age" type="number" min="0" required>
          </div>
          <div class="field-group">
            <label>المنطقة</label>
            <input type="text" value="{{ request.user.region }}" readonly class="input-readonly" style="color:#64748b; border-color:#e2e8f0;">
          </div>
        </div>

        <div class="grid-2">
          <div class="field-group">
            <label>خط العرض (Latitude)</label>
            <input id="latitude" name="latitude" type="text" readonly class="input-readonly" placeholder="سيتم التحديد من الخريطة">
          </div>
          <div class="field-group">
            <label>خط الطول (Longitude)</label>
            <input id="longitude" name="longitude" type="text" readonly class="input-readonly" placeholder="سيتم التحديد من الخريطة">
          </div>
        </div>

        <div class="field-group" style="margin-top:5px;">
          <label>وصف الموقع</label>
          <input name="location_description" type="text" placeholder="بجوار المسجد / الطريق السريع...">
        </div>

        <div class="field-group" style="margin-top:12px;">
          <label>تفاصيل البلاغ</label>
          <textarea name="details" rows="3" required placeholder="اكتب تفاصيل الاستجابة هنا..."></textarea>
        </div>

        <button type="submit" class="btn-submit" style="margin-top:15px;">✅ حفظ وإرسال البلاغ</button>
      </form>
    </div>
  </div>

  <div class="map-column">
    <div class="column-header" style="background: #334155;">
      <span><i class="fas fa-map-marked-alt"></i> تحديد موقع الاستجابة</span>
    </div>
    <div class="map-toolbar" id="geo-status">
      <i class="fas fa-spinner fa-spin"></i> جاري محاولة تحديد منطقتك الحالية...
    </div>
    <div id="map-canvas"></div>
  </div>

</div>

<script>
  let map, marker;

  function initMap() {
    // الرياض كمركز افتراضي
    const defaultLoc = { lat: 24.7136, lng: 46.6753 };
    
    map = new google.maps.Map(document.getElementById("map-canvas"), {
      zoom: 13,
      center: defaultLoc,
      mapTypeId: 'roadmap',
      gestureHandling: "greedy"
    });

    // محاولة تحديد الموقع التلقائي للمستخدم
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const userPos = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
          map.setCenter(userPos);
          updateLocationFields(userPos);
          document.getElementById('geo-status').innerHTML = '<i class="fas fa-check-circle" style="color:green"></i> تم تحديد منطقتك الحالية بنجاح';
        },
        () => {
          document.getElementById('geo-status').innerHTML = '<i class="fas fa-exclamation-triangle"></i> تعذر تحديد الموقع تلقائياً، يرجى النقر على الخريطة';
        }
      );
    }

    // النقر اليدوي لتغيير الموقع
    map.addListener("click", (e) => {
      updateLocationFields(e.latLng);
    });
  }

  function updateLocationFields(location) {
    const lat = typeof location.lat === 'function' ? location.lat() : location.lat;
    const lng = typeof location.lng === 'function' ? location.lng() : location.lng;

    document.getElementById("latitude").value = lat.toFixed(6);
    document.getElementById("longitude").value = lng.toFixed(6);

    if (marker) marker.setMap(null);
    marker = new google.maps.Marker({
      position: {lat: lat, lng: lng},
      map: map,
      animation: google.maps.Animation.DROP,
      icon: {
          url: "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
      }
    });

    // تعبئة الوقت تلقائياً عند أول تحديد للموقع لتوفير الجهد
    if(!document.getElementById("cad_received_time").value) {
        const now = new Date();
        const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
        document.getElementById("cad_received_time").value = time;
    }
  }

  async function submitCreateReport(ev) {
    ev.preventDefault();
    const fd = new FormData(ev.target);
    
    try {
      const resp = await fetch("/reports/create/", {
        method: "POST",
        body: fd,
        headers: { "X-CSRFToken": "{{ csrf_token }}" }
      });
      if (resp.ok) {
        Swal.fire('تم الحفظ', 'تم إنشاء البلاغ بنجاح', 'success');
        ev.target.reset();
        if (marker) marker.setMap(null);
      } else {
        const data = await resp.json();
        Swal.fire('خطأ', data.error || 'حدث خطأ أثناء الحفظ', 'error');
      }
    } catch (e) {
      Swal.fire('خطأ', 'فشل الاتصال بالخادم', 'error');
    }
  }
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap"></script>

{% endblock %}
