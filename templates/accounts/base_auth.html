{% load static %}
<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ECR{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --brand:#a50219;
      --brand-dark:#b85858;
      --paper:#ffffff;
      --paper-tint:#fbf2f2;
      --ink:#111827;
      --muted:#806b6b;
      --stroke:#e7bdbd;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Tajawal',sans-serif; background:#fff; color:var(--ink); min-height:100vh; }
    .auth-wrap{ min-height:100vh; display:flex; flex-direction:row; direction:ltr; }
    .brand-side{
      width:58%;
      background: linear-gradient(180deg, var(--brand) 0%, var(--brand-dark) 100%);
      display:flex; align-items:center; justify-content:center;
      padding:40px 30px; position:relative;
    }
    .brand-side::after{
      content:""; position:absolute; top:0; right:-1px;
      width:24px; height:100%;
      background: linear-gradient(90deg, rgba(0,0,0,0.20), rgba(0,0,0,0.0));
      opacity:.20; pointer-events:none;
    }
    .btn-ecr{
      width:100%;
      border-radius:10px;
      padding:11px;
      border:1px solid #c46666;
      background:#ffffff;
      color:#c46666;
      font-weight:900;
      transition:0.25s;
    }

    /* عند مرور الماوس */
    .btn-ecr:hover{
      background:#c46666;
      color:white;
      border-color:#c46666;
    }
    .brand-inner{ text-align:center; color:#fff; direction:rtl; }
    .brand-image{
      display:block; max-width:min(520px, 80%); height:auto; margin:0 auto;
      filter: drop-shadow(0 18px 28px rgba(0,0,0,.10));
    }
    .form-side{
      width:42%;
      background: linear-gradient(180deg, var(--paper) 0%, var(--paper-tint) 100%);
      display:flex; align-items:center; justify-content:center;
      padding:40px 26px; direction:rtl;
    }
    .form-box{ width:min(420px, 100%); }
    .page-title{ font-size:46px; font-weight:900; color: var(--brand-dark); margin:0 0 8px; }
    .page-sub{ margin:0 0 26px; color: var(--muted); font-size:13.5px; line-height:1.9; max-width:360px; }
    .form-label{ font-weight:800; color:#2b2b2b; font-size:12.5px; margin-bottom:8px; }
    .errorlist{ margin: 8px 0 0; padding: 0; list-style:none; color:#7f1d1d; font-weight:800; font-size:12px; }
    .small-help{ color:var(--muted); font-size:12px; margin-top:8px; }
    .link-soft{ color: var(--brand-dark); text-decoration:none; font-weight:800; font-size:12px; }
    .link-soft:hover{ text-decoration:underline; }
    .form-box input[type="text"],
    .form-box input[type="email"],
    .form-box input[type="password"],
    .form-box input[type="number"],
    .form-box input[type="tel"],
    .form-box textarea,
    .form-box select{
      width:100%;
      border-radius: 10px;
      border: 1.5px solid var(--stroke);
      padding: 11px 12px;
      background:#fff;
      outline:none;
    }
    .form-box input:focus,
    .form-box textarea:focus,
    .form-box select:focus{
      border-color: rgba(184,88,88,.65);
      box-shadow: 0 0 0 .20rem rgba(196,102,102,.16);
    }
    .otp-wrap{ display:flex; gap:10px; justify-content:space-between; direction:ltr; }
    .otp-box{
      width:52px; height:44px; border-radius:10px; border:1.5px solid var(--stroke);
      text-align:center; font-weight:900; font-size:18px; outline:none; background:#fff;
    }
    .otp-box:focus{ border-color: rgba(184,88,88,.65); box-shadow: 0 0 0 .20rem rgba(196,102,102,.16); }
    @media (max-width: 992px){
      .auth-wrap{ flex-direction:column; direction:rtl; }
      .brand-side{ width:100%; min-height: 280px; }
      .brand-side::after{ display:none; }
      .form-side{ width:100%; }
      .page-title{ font-size:34px; }
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="auth-wrap">
    <aside class="brand-side">
      <div class="brand-inner">
        <img class="brand-image" src="/static/login.png" alt="ECR">
      </div>
    </aside>
    <main class="form-side">
      <div class="form-box">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  {% block extra_js %}{% endblock %}
</body>
</html>
