{% extends "portal/base_portal.html" %}
{% load static %}
{% block content %}
<title>تحليل البلاغات على الخريطة</title>

<style>
  :root{
    --line:#e2e8f0;
    --card:#fff;
    --txt:#0f172a;
    --muted:#64748b;
    --shadow:0 10px 15px -3px rgba(0,0,0,.08);
    --r:14px;
  }

  .wrap{ padding:12px; }

  .toolbar{
    background:var(--card);
    border:1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    padding:10px 12px;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    direction: rtl;
    margin-bottom:10px;
  }
  .toolbar .title{
    font-weight:950;
    color:var(--txt);
    display:flex;
    gap:10px;
    align-items:center;
  }
  .toolbar .title .dot{
    width:10px;height:10px;border-radius:999px;background:#22c55e;
    box-shadow: 0 0 0 4px rgba(34,197,94,.15);
  }

  .filters{
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
  }
  .inp, .sel{
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 12px;
    background:#fff;
    color:var(--txt);
    outline:none;
    min-width: 160px;
  }
  .btn{
    border:none;
    border-radius:12px;
    padding:10px 12px;
    font-weight:900;
    cursor:pointer;
    display:inline-flex;
    gap:8px;
    align-items:center;
  }
  .btn-primary{ background:#2563eb; color:#fff; }
  .btn-ghost{ background:#fff; border:1px solid var(--line); color:var(--txt); }
  .btn-warn{ background:#f59e0b; color:#111; }
  .btn:disabled{ opacity:.6; cursor:not-allowed; }

  .grid{
    display:grid;
    grid-template-columns: 1fr 340px;
    gap:10px;
    min-height: calc(100vh - 190px);
  }

  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    overflow:hidden;
  }
  .ph{
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    direction: rtl;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .ph .h{ font-weight:950; color:var(--txt); }
  .pb{ padding: 10px 12px; direction: rtl; }

  #mapWrap{ position:relative; padding:0; }
  #map{ width:100%; height: calc(100vh - 250px); min-height:560px; }

  .legend{
    position:absolute;
    left:12px; bottom:12px;
    background:#fff;
    border:1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding:10px 12px;
    direction: rtl;
    max-width: 360px;
  }
  .legend .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .chip{
    display:inline-flex; gap:8px; align-items:center;
    padding:6px 10px; border-radius:999px;
    font-weight:900; font-size:12px;
    border:1px solid var(--line);
    background:#fff;
  }
  .sw{ width:12px; height:12px; border-radius:999px; display:inline-block; }

  .list{
    display:flex; flex-direction:column; gap:8px;
  }
  .item{
    border:1px solid var(--line);
    border-radius: 14px;
    padding:10px 12px;
    background:#fff;
    box-shadow: 0 6px 14px rgba(0,0,0,.06);
    cursor:pointer;
  }
  .item:hover{ outline: 2px solid rgba(37,99,235,.15); }
  .item .t{ font-weight:950; color:var(--txt); display:flex; justify-content:space-between; gap:10px; }
  .item .m{ color:var(--muted); font-weight:800; margin-top:6px; font-size:12px; }
  .pill{
    padding:4px 10px; border-radius:999px;
    font-weight:950; font-size:12px;
    border:1px solid var(--line);
    background:#f8fafc;
  }

  /* Debug panel */
  .dbg{
    margin-top:10px;
    background:#0b1220;
    border:1px solid #111827;
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow:hidden;
    direction:ltr;
  }
  .dbg .dh{
    padding:10px 12px;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,.08);
    color:#e5e7eb;
  }
  .dbg .dh .left{ display:flex; gap:10px; align-items:center; }
  .dbg .dh .tag{
    font-weight:900;
    font-size:12px;
    padding:4px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.10);
  }
  .dbg .dh a{ color:#93c5fd; text-decoration:none; font-weight:900; }
  .dbg pre{
    margin:0;
    padding:12px;
    color:#e5e7eb;
    font-size:12px;
    line-height:1.6;
    white-space:pre;
    overflow:auto;
    max-height: 320px;
  }

  /* Toast */
  .toast{
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 9999;
    background:#fff;
    border:1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding:10px 12px;
    min-width: 260px;
    display:none;
    direction: rtl;
  }
  .toast .t{ font-weight:950; color:var(--txt); }
  .toast .m{ margin-top:4px; color:var(--muted); font-weight:800; font-size:12px; }

  @media(max-width: 1100px){
    .grid{ grid-template-columns: 1fr; }
    #map{ height: 520px; min-height: 520px; }
  }
</style>

<div class="wrap">

  <div class="toolbar">
    <div class="title">
      <span class="dot"></span>
      <span>تحليل البلاغات على الخريطة (AI Hotspots)</span>
    </div>

    <div class="filters">
      <select id="rangePreset" class="sel" style="min-width:180px;">
        <option value="24h">آخر 24 ساعة</option>
        <option value="7d" selected>آخر 7 أيام</option>
        <option value="30d">آخر 30 يوم</option>
        <option value="custom">مخصص</option>
      </select>

      <input id="fromDt" type="datetime-local" class="inp" style="min-width:220px; display:none;">
      <input id="toDt" type="datetime-local" class="inp" style="min-width:220px; display:none;">

      <select id="status" class="sel" style="min-width:160px;">
        <option value="">كل الحالات</option>
        <option value="open">مفتوح</option>
        <option value="closed">مغلق</option>
      </select>

      <select id="caseType" class="sel" style="min-width:200px;">
        <option value="">كل الأنواع</option>
      </select>

      <select id="mode" class="sel" style="min-width:170px;">
        <option value="heatmap" selected>Heatmap</option>
        <option value="clusters">Clusters</option>
        <option value="both">كلاهما</option>
      </select>

      <label class="btn btn-ghost" style="padding:8px 10px;">
        <input id="debugToggle" type="checkbox" style="margin-left:8px;">
        عرض Debug
      </label>

      <button id="btnApply" class="btn btn-primary">تطبيق</button>
      <button id="btnReset" class="btn btn-ghost">إعادة</button>
    </div>
  </div>

  <div class="grid">
    <div class="panel" id="mapPanel">
      <div class="ph">
        <div class="h">الخريطة</div>
        <div style="display:flex; gap:8px; align-items:center;">
          <span class="pill" id="stCount">—</span>
        </div>
      </div>

      <div class="pb" id="mapWrap" style="padding:0;">
        <div id="map"></div>

        <div class="legend">
          <div class="row">
            <span class="chip"><span class="sw" style="background:#2563eb;"></span> بلاغ</span>
            <span class="chip"><span class="sw" style="background:#16a34a;"></span> مستجيب</span>
            <span class="chip"><span class="sw" style="background:#f59e0b;"></span> تحذير (15د)</span>
            <span class="chip"><span class="sw" style="background:#ef4444;"></span> خطر (25د)</span>
          </div>
        </div>
      </div>

      <!-- Debug panel تحت الخريطة -->
      <div id="debugPanel" class="dbg" style="display:none;">
        <div class="dh">
          <div class="left">
            <span class="tag">DEBUG</span>
            <span id="dbgStatus" class="tag">—</span>
          </div>
          <div style="display:flex; gap:10px; align-items:center;">
            <a id="dbgOpenUrl" href="#" target="_blank" rel="noopener">فتح رابط API</a>
            <button id="dbgCopy" class="btn btn-ghost" style="padding:8px 10px;">نسخ JSON</button>
          </div>
        </div>
        <pre id="dbgPre">{}</pre>
      </div>
    </div>

    <div class="panel">
      <div class="ph">
        <div class="h">كثافة البلاغات</div>
        <span class="pill" id="hsCount">0</span>
      </div>
      <div class="pb">
        <div class="list" id="hotspotsList">
          <div class="item" style="cursor:default;">
            <div class="t"><span>—</span><span class="pill">—</span></div>
            <div class="m">اختر فلترة ثم تطبيق</div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast">
  <div class="t" id="toastT">تنبيه</div>
  <div class="m" id="toastM">—</div>
</div>

<!-- Google Maps (async + callback) -->
<script>
  // سيتم استدعاؤها بواسطة Google Maps عبر callback
  window.initAiHotspotsMap = window.initAiHotspotsMap || function(){};
</script>
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=visualization&language=ar&callback=initAiHotspotsMap">
</script>

<script>
(() => {
  // === عناصر الفلاتر ===
  const rangePreset = document.getElementById("rangePreset");
  const fromDt = document.getElementById("fromDt");
  const toDt = document.getElementById("toDt");
  const statusEl = document.getElementById("status");
  const caseTypeEl = document.getElementById("caseType");
  const modeEl = document.getElementById("mode");
  const btnApply = document.getElementById("btnApply");
  const btnReset = document.getElementById("btnReset");
  const stCount = document.getElementById("stCount");
  const hsCount = document.getElementById("hsCount");
  const hotspotsList = document.getElementById("hotspotsList");

  // debug
  const debugToggle = document.getElementById("debugToggle");
  const debugPanel = document.getElementById("debugPanel");
  const dbgPre = document.getElementById("dbgPre");
  const dbgStatus = document.getElementById("dbgStatus");
  const dbgOpenUrl = document.getElementById("dbgOpenUrl");
  const dbgCopy = document.getElementById("dbgCopy");

  // toast
  const toast = document.getElementById("toast");
  const toastT = document.getElementById("toastT");
  const toastM = document.getElementById("toastM");
  let toastTimer = null;

  // === خريطة / طبقات ===
  let map, heatmap;
  let ICONS = null;
  let _initialized = false;
  let reportMarkers = [];
  let responderMarkers = [];
  let hotspotMarkers = [];
  let markerCluster = null;

  // === Helpers ===
  const pad2 = (n) => String(n).padStart(2, "0");
  const toIsoLocal = (d) => {
    // YYYY-MM-DDTHH:mm
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  };

  function showToast(title, msg){
    toastT.textContent = title;
    toastM.textContent = msg;
    toast.style.display = "block";
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.style.display = "none"; }, 4500);
  }

  function computeRange(preset){
    const now = new Date();
    let from = null, to = now;

    if(preset === "24h"){
      from = new Date(now.getTime() - 24*60*60*1000);
    } else if(preset === "7d"){
      from = new Date(now.getTime() - 7*24*60*60*1000);
    } else if(preset === "30d"){
      from = new Date(now.getTime() - 30*24*60*60*1000);
    } else {
      // custom
      from = fromDt.value ? new Date(fromDt.value) : null;
      to = toDt.value ? new Date(toDt.value) : now;
    }

    return { from, to };
  }

  function setCustomVisibility(){
    const isCustom = rangePreset.value === "custom";
    fromDt.style.display = isCustom ? "" : "none";
    toDt.style.display = isCustom ? "" : "none";
    if(isCustom){
      const now = new Date();
      const week = new Date(now.getTime() - 7*24*60*60*1000);
      if(!fromDt.value) fromDt.value = toIsoLocal(week);
      if(!toDt.value) toDt.value = toIsoLocal(now);
    }
  }

  function clearLayer(){
    reportMarkers.forEach(m => m.setMap(null));
    responderMarkers.forEach(m => m.setMap(null));
    hotspotMarkers.forEach(m => m.setMap(null));
    reportMarkers = [];
    responderMarkers = [];
    hotspotMarkers = [];

    if(heatmap){ heatmap.setMap(null); heatmap = null; }

    if(markerCluster){
      markerCluster.clearMarkers();
      markerCluster = null;
    }
  }

  function buildQuery(){
    const {from, to} = computeRange(rangePreset.value);
    const qs = new URLSearchParams();
    if(from) qs.set("from", from.toISOString());
    if(to) qs.set("to", to.toISOString());
    if(statusEl.value) qs.set("status", statusEl.value);
    if(caseTypeEl.value) qs.set("case_type", caseTypeEl.value);
    qs.set("mode", modeEl.value);
    return qs.toString();
  }

  function apiUrl(){
    const q = buildQuery();
    return `{% url 'cad_reports:cad_api_ai_hotspots' %}?${q}`;
  }

  function renderHotspotsList(hotspots){
    hsCount.textContent = String(hotspots.length);
    if(!hotspots.length){
      hotspotsList.innerHTML = `
        <div class="item" style="cursor:default;">
          <div class="t"><span>لا توجد hotspots</span><span class="pill">0</span></div>
          <div class="m">جرّب تغيير الفترة أو الفلاتر</div>
        </div>
      `;
      return;
    }

    hotspotsList.innerHTML = hotspots.map((h, idx) => `
      <div class="item" data-idx="${idx}">
        <div class="t">
          <span>#${idx+1} — ${h.label || "موقع ساخن"}</span>
          <span class="pill">${h.count}</span>
        </div>
        <div class="m">
          أعلى نوع: <b>${h.top_case_type || "—"}</b>
          &nbsp;•&nbsp; متوسط مدة: <b>${h.avg_duration || "—"}</b>
        </div>
      </div>
    `).join("");

    hotspotsList.querySelectorAll(".item").forEach(el => {
      el.addEventListener("click", () => {
        const i = Number(el.getAttribute("data-idx"));
        const h = hotspots[i];
        if(h && map){
          map.panTo({lat: h.lat, lng: h.lng});
          map.setZoom(Math.max(map.getZoom(), 14));
        }
      });
    });
  }

  function setDebugVisible(){
    debugPanel.style.display = debugToggle.checked ? "" : "none";
  }

  function setDebugPayload(statusText, url, payloadObj){
    dbgStatus.textContent = statusText || "OK";
    dbgOpenUrl.href = url || "#";
    try{
      // JSON.stringify يعرض العربي طبيعي داخل الصفحة (بدون \uXXXX)
      dbgPre.textContent = JSON.stringify(payloadObj ?? {}, null, 2);
    }catch(e){
      dbgPre.textContent = String(payloadObj ?? "");
    }
  }

  // === تحميل أنواع الحالات للقائمة ===
  async function loadCaseTypes(){
    try{
      const res = await fetch("{% url 'cad_reports:cad_api_case_types' %}", { credentials: "same-origin" });
      const data = await res.json();
      const items = Array.isArray(data.items) ? data.items : [];
      caseTypeEl.innerHTML = `<option value="">كل الأنواع</option>` + items.map(x => `<option value="${x.value}">${x.label}</option>`).join("");
    }catch(e){
      // لا توقف الصفحة
      showToast("تنبيه", "تعذر تحميل أنواع الحالات (سيتم استخدام القائمة الافتراضية)");
    }
  }

  // === تحميل التحليل ===
  async function apply(){
    btnApply.disabled = true;
    clearLayer();
    stCount.textContent = "تحميل...";

    const url = apiUrl();
    if(debugToggle.checked){
      setDebugPayload("LOADING", url, { note: "loading..." });
    }

    try{
      const res = await fetch(url, { credentials: "same-origin" });

      // حاول تقرأ JSON حتى لو كان status=500 (مفيد لأن backend يرجع {"error": "..."} عندك)
      let data = null;
      let rawText = null;
      const ct = (res.headers.get("content-type") || "").toLowerCase();

      if(ct.includes("application/json")){
        data = await res.json();
      }else{
        rawText = await res.text();
      }

      if(!res.ok){
        console.error("AI Hotspots API failed:", res.status, data || rawText);
        const msg = (data && data.error) ? data.error : (rawText || `HTTP ${res.status}`);
        if(debugToggle.checked){
          setDebugPayload(`HTTP_${res.status}`, url, data || { raw: rawText });
        }
        throw new Error(msg);
      }

      if(debugToggle.checked){
        setDebugPayload("OK", url, data);
      }

      const points = Array.isArray(data?.points) ? data.points : [];
      const responders = Array.isArray(data?.responders) ? data.responders : [];
      const hotspots = Array.isArray(data?.hotspots) ? data.hotspots : [];

      stCount.textContent = `بلاغات: ${points.length} • مستجيبون: ${responders.length}`;

      // 1) رسم البلاغات
      points.forEach(p => {
        const m = new google.maps.Marker({
          map,
          position: {lat: p.lat, lng: p.lng},
          icon: ICONS.report,
          title: `بلاغ ${p.cad_number || ""}`,
        });

        const info = new google.maps.InfoWindow({
          content: `
            <div style="direction:rtl; font-weight:900; color:#0f172a;">
              <div>بلاغ: <b>${p.cad_number || "—"}</b></div>
              <div style="margin-top:6px; color:#64748b; font-weight:800;">
                النوع: ${p.case_type_label || "—"}<br/>
                الحالة: ${p.status_label || "—"}
              </div>
            </div>
          `
        });
        m.addListener("click", () => info.open({ anchor: m, map }));
        reportMarkers.push(m);
      });

      // 2) المستجيبين
      responders.forEach(r => {
        const m = new google.maps.Marker({
          map,
          position: {lat: r.lat, lng: r.lng},
          icon: ICONS.responder,
          title: r.name || "مستجيب",
        });

        const info = new google.maps.InfoWindow({
          content: `
            <div style="direction:rtl; font-weight:900; color:#0f172a;">
              <div>المستجيب: <b>${r.name || "—"}</b></div>
              <div style="margin-top:6px; color:#64748b; font-weight:800;">
                المجموعة: ${r.group || "—"}<br/>
                آخر تحديث: ${r.updated_at || "—"}
              </div>
            </div>
          `
        });
        m.addListener("click", () => info.open({ anchor: m, map }));
        responderMarkers.push(m);
      });

      // 3) Heatmap
      const mode = modeEl.value;
      if(mode === "heatmap" || mode === "both"){
        const heatPts = points.map(p => new google.maps.LatLng(p.lat, p.lng));
        heatmap = new google.maps.visualization.HeatmapLayer({
          data: heatPts,
          radius: 28,
          opacity: 0.75,
          gradient: [
            "rgba(37,99,235,0)",
            "rgba(37,99,235,0.35)",
            "rgba(59,130,246,0.55)",
            "rgba(245,158,11,0.75)",
            "rgba(239,68,68,0.9)"
          ]
        });
        heatmap.setMap(map);
      }

      // 4) Hotspots
      hotspots.forEach(h => {
        const lvl = (h.minutes >= 25) ? "danger" : (h.minutes >= 15 ? "warn" : "ok");
        const icon = (lvl === "danger") ? ICONS.hotspot("danger") : ICONS.hotspot("warn");

        const m = new google.maps.Marker({
          map,
          position: {lat: h.lat, lng: h.lng},
          icon,
          title: `Hotspot (${h.count})`,
        });

        const info = new google.maps.InfoWindow({
          content: `
            <div style="direction:rtl; font-weight:900; color:#0f172a;">
              <div>Hotspot: <b>${h.label || "—"}</b></div>
              <div style="margin-top:6px; color:#64748b; font-weight:800;">
                العدد: <b>${h.count}</b><br/>
                أعلى نوع: <b>${h.top_case_type || "—"}</b><br/>
                متوسط مدة: <b>${h.avg_duration || "—"}</b>
              </div>
            </div>
          `
        });
        m.addListener("click", () => info.open({ anchor: m, map }));
        hotspotMarkers.push(m);
      });

      renderHotspotsList(hotspots);

      // توسيط الخريطة على أول نتيجة
      if(points.length){
        map.panTo({lat: points[0].lat, lng: points[0].lng});
        map.setZoom(12);
      }else{
        // لو ما فيه نقاط، خلك على نفس المركز
        map.setZoom(Math.max(map.getZoom(), 7));
      }

    }catch(err){
      console.error(err);
      stCount.textContent = "فشل التحميل";
      hotspotsList.innerHTML = `
        <div class="item" style="cursor:default;">
          <div class="t"><span>خطأ</span><span class="pill">!</span></div>
          <div class="m">تعذر جلب البيانات من API — افتح Debug أو Console لمعرفة السبب.</div>
        </div>
      `;
      showToast("تعذر جلب البيانات", (err && err.message) ? err.message : "خطأ غير معروف");
    }finally{
      btnApply.disabled = false;
    }
  }

  function resetFilters(){
    rangePreset.value = "7d";
    statusEl.value = "";
    caseTypeEl.value = "";
    modeEl.value = "heatmap";
    setCustomVisibility();
  }

  // === init ===
  window.initAiHotspotsMap = async function(){
    if(_initialized) return;
    _initialized = true;

    map = new google.maps.Map(document.getElementById("map"), {
      center: {lat: 24.7136, lng: 46.6753}, // الرياض افتراضي
      zoom: 7,
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: true,
    });

    ICONS = {
      report: {
        path: google.maps.SymbolPath.CIRCLE,
        fillColor: "#2563eb",
        fillOpacity: 1,
        strokeColor: "#ffffff",
        strokeWeight: 2,
        scale: 7,
      },
      responder: {
        path: "M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z",
        fillColor: "#16a34a",
        fillOpacity: 1,
        strokeColor: "#ffffff",
        strokeWeight: 1.5,
        scale: 1.6,
        anchor: new google.maps.Point(12, 24),
      },
      hotspot: (level) => ({
        path: google.maps.SymbolPath.BACKWARD_CLOSED_ARROW,
        fillColor: level === "danger" ? "#ef4444" : "#f59e0b",
        fillOpacity: 1,
        strokeColor: "#ffffff",
        strokeWeight: 2,
        scale: 6,
      })
    };

    setCustomVisibility();
    setDebugVisible();
    await loadCaseTypes();
    await apply();
  };

  // events
  rangePreset.addEventListener("change", setCustomVisibility);
  debugToggle.addEventListener("change", setDebugVisible);

  dbgCopy.addEventListener("click", async () => {
    try{
      await navigator.clipboard.writeText(dbgPre.textContent || "{}");
      showToast("تم النسخ", "تم نسخ JSON إلى الحافظة");
    }catch(e){
      showToast("تنبيه", "المتصفح منع النسخ — انسخ يدويًا");
    }
  });

  btnApply.addEventListener("click", apply);
  btnReset.addEventListener("click", async () => { resetFilters(); await apply(); });
})();
</script>
{% endblock %}
